name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.12
    - name: Install dependencies
      run: uv sync --dev
    - name: Run linter (ruff)
      run: uv run ruff check src tests
    - name: Run security linter (ruff with security rules)
      run: uv run ruff check --select S src tests || echo "Security lint found issues (non-blocking)"
    - name: Run type checker (pyright)
      run: uv run pyright
    - name: Run tests with coverage
      env:
        PYTHONPATH: .
      run: uv run pytest --cov=src tests/

  sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.12
    - name: Install dependencies
      run: uv sync --dev
    - name: Run ruff security audit
      run: uv run ruff check --select S src || true
    - name: Run bandit-style safety check
      run: uv run ruff check --select INP src || true
