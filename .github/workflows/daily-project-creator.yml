name: Daily Project Creator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  create-project:
    name: Generate and create daily project
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run Jules Tracker Agent (answer questions / review plans)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: juninmd
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ vars.LITELLM_API_BASE || 'https://litellm.antonio-code.duckdns.org/v1' }}
          AI_PROVIDER: litellm
          AI_MODEL: cloud/llama-70b
          ENABLE_AI: "true"
        run: uv run run-agent jules-tracker --ai-provider litellm --ai-model cloud/llama-70b

      - name: Run Project Creator Agent
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: juninmd
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ vars.LITELLM_API_BASE || 'https://litellm.antonio-code.duckdns.org/v1' }}
          AI_PROVIDER: litellm
          AI_MODEL: cloud/llama-70b
          ENABLE_AI: "true"
        run: uv run run-agent project-creator --ai-provider litellm --ai-model cloud/llama-70b

      - name: Run Jules Cleaner Agent (delete sessions older than 2 days)
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_OWNER: juninmd
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JULES_CLEANER_MAX_AGE_DAYS: "2"
        run: uv run run-agent jules-cleaner
