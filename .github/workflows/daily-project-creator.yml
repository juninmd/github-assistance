name: Daily Project Creator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  create-project:
    name: Generate and create daily project
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run Project Creator Agent
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          GITHUB_OWNER: juninmd
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ vars.LITELLM_API_BASE || 'http://litellm.ai.svc.cluster.local:4000' }}
          AI_PROVIDER: litellm
          AI_MODEL: cloud/llama-70b
          ENABLE_AI: "true"
        run: uv run run-agent project-creator --ai-provider litellm --ai-model cloud/llama-70b
