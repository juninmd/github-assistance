name: Validate

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    uses: juninmd/base-actions/.github/workflows/reusable-validate.yml@main

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Check for committed secrets
        run: |
          forbidden=$(git ls-files | grep -E '(^|/)\.env$|(^|/)\.env\.(local|production|prod|staging|dev)$|(^|/)id_rsa$|(^|/).+\.pem$|(^|/).+\.key$' || true)
          if [ -n "$forbidden" ]; then
            echo "Secret files tracked: $forbidden"
            exit 1
          fi
          echo "No committed secrets found."
      - run: uv run ruff check .
      - run: uv run pyright
      - name: No prohibited cron workflows
        run: uv run python scripts/check_no_cron_workflows.py
