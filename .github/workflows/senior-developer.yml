name: Senior Developer Agent

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  run-senior-developer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install opencode
        run: sudo npm install -g opencode-ai@latest

      - name: Run Senior Developer Agent
        env:
          PYTHONPATH: .
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: juninmd
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEV_AGENT_ENABLED: true
          ENABLE_AI: true
          AI_PROVIDER: ollama
          AI_MODEL: qwen3:1.7b
          JULES_BURST_MAX_ACTIONS: 100
          JULES_DAILY_SESSION_LIMIT: 100
          JULES_BURST_TRIGGER_HOUR_UTC_MINUS_3: 18
        run: |
          uv run run-agent senior-developer
